<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>netra · English ↔ Khmer Translation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Brand palette */
    --primary: #e75f1b;       /* Primary */
    --gold: #f6c416;          /* Accent */
    --brown: #4f2724;         /* Accent */
    --ink: #191014;           /* Secondary */
    --bg: #fdfdfd;            /* Background */
    --panel: #ffffff;
    /* Derived */
    --primary-dark: #c84e13;
    --primary-tint: #fdeee6;
    --border: #ece0db;
    --muted: #8a7872;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Sans Khmer", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }

  header {
    background: var(--ink);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 3px solid var(--primary);
  }
  header .eye { height: 46px; width: auto; flex: none; }
  header .titles { display: flex; flex-direction: column; gap: 6px; }
  header .wordmark { height: 38px; width: auto; display: block; align-self: flex-start; }
  header .sub { color: #d7c7c1; font-size: 12.5px; }
  main { max-width: 940px; margin: 40px auto; padding: 0 20px; }

  .langbar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 12px 14px;
  }
  .lang {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
    font-weight: 600;
    font-size: 15px;
    padding: 9px 14px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .lang::before {
    content: ""; width: 9px; height: 9px; flex: none;
  }
  #srcLang::before { background: var(--primary); }
  #tgtLang::before { background: var(--gold); }
  #tgtLang { justify-content: flex-end; flex-direction: row-reverse; }
  .swap {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--primary);
    width: 40px; height: 40px; flex: none;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s, color .15s;
  }
  .swap:hover { background: var(--primary); border-color: var(--primary); color: #fff; }

  .panes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--panel);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .pane { padding: 22px; min-height: 240px; position: relative; }
  .pane:first-child { border-right: 1px solid var(--border); }
  .pane .tag {
    display: block;
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }
  textarea, .output {
    width: 100%;
    min-height: 180px;
    border: none;
    outline: none;
    resize: none;
    font-size: 18px;
    line-height: 1.7;
    font-family: inherit;
    background: transparent;
    color: var(--ink);
  }
  .pane:focus-within { box-shadow: inset 3px 0 0 var(--primary); }
  .output { white-space: pre-wrap; }
  .output.placeholder { color: var(--muted); }
  .pane .foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
    color: var(--muted); font-size: 13px;
  }
  .iconbtn {
    border: none; background: transparent; color: var(--muted);
    cursor: pointer; font-size: 13px; font-weight: 600; padding: 5px 8px;
    font-family: inherit;
  }
  .iconbtn:hover { background: var(--primary-tint); color: var(--primary); }

  .controls {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 18px;
  }
  .controls .left { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; }
  select {
    border: 1px solid var(--border); padding: 9px 12px;
    font-size: 14px; background: var(--panel); color: var(--ink);
    font-family: inherit; cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--primary); }
  .btn {
    background: var(--primary); color: #fff; border: none;
    padding: 12px 30px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .15s;
    font-family: inherit;
  }
  .btn:hover { background: var(--primary-dark); }
  .btn:disabled { background: #c4b3ad; cursor: default; }
  .spinner {
    display: none; width: 16px; height: 16px; border: 2px solid #fff;
    border-top-color: transparent; border-radius: 50%;
    animation: spin .7s linear infinite; vertical-align: middle; margin-left: 6px;
  }
  .btn.loading .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 680px) {
    .panes { grid-template-columns: 1fr; }
    .pane:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
  <header>
    <img class="eye" src="/static/netra-eye.png" alt="netra" />
    <span class="titles">
      <img class="wordmark" src="/static/netra-wordmark.png" alt="netra" />
      <span class="sub">English ↔ Khmer · Neural Machine Translation</span>
    </span>
  </header>

  <main>
    <div class="langbar">
      <div class="lang" id="srcLang">English</div>
      <button class="swap" id="swapBtn" title="Swap languages" aria-label="Swap languages">⇄</button>
      <div class="lang" id="tgtLang">Khmer</div>
    </div>

    <div class="panes">
      <div class="pane">
        <span class="tag">source</span>
        <textarea id="input" placeholder="Enter text" autofocus></textarea>
        <div class="foot">
          <span id="counter">0 characters</span>
          <button class="iconbtn" id="clearBtn">Clear</button>
        </div>
      </div>
      <div class="pane">
        <span class="tag">translation</span>
        <div class="output placeholder" id="output">Translation</div>
        <div class="foot">
          <span></span>
          <button class="iconbtn" id="copyBtn">Copy</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="left">
        <label for="mode">Decoding</label>
        <select id="mode">
          <option value="greedy">Greedy (fast)</option>
          <option value="beam">Beam search (quality)</option>
        </select>
      </div>
      <button class="btn" id="translateBtn">Translate<span class="spinner"></span></button>
    </div>
  </main>


<script>
  const LABELS = { en: "English", km: "Khmer" };
  let direction = "en2km";   // "en2km" | "km2en"

  const $ = (id) => document.getElementById(id);
  const input = $("input"), output = $("output");
  const srcLang = $("srcLang"), tgtLang = $("tgtLang");
  const translateBtn = $("translateBtn"), swapBtn = $("swapBtn");

  function srcTgt() {
    return direction === "en2km" ? ["en", "km"] : ["km", "en"];
  }
  function refreshLabels() {
    const [s, t] = srcTgt();
    srcLang.textContent = LABELS[s];
    tgtLang.textContent = LABELS[t];
  }
  function setOutput(text, isPlaceholder = false) {
    output.textContent = text;
    output.classList.toggle("placeholder", isPlaceholder);
  }

  async function translate() {
    const text = input.value.trim();
    if (!text) { setOutput("Translation", true); return; }
    translateBtn.classList.add("loading");
    translateBtn.disabled = true;
    try {
      const res = await fetch("/api/translate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, direction, mode: $("mode").value }),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      setOutput(data.translation || "", !data.translation);
    } catch (e) {
      setOutput("Error: " + e.message, true);
    } finally {
      translateBtn.classList.remove("loading");
      translateBtn.disabled = false;
    }
  }

  // Debounced auto-translate as you type.
  let timer = null;
  function scheduleTranslate() {
    clearTimeout(timer);
    $("counter").textContent = input.value.length + " characters";
    timer = setTimeout(translate, 600);
  }

  function swap() {
    direction = direction === "en2km" ? "km2en" : "en2km";
    refreshLabels();
    // Move the current translation into the input for round-trip editing.
    const prev = output.classList.contains("placeholder") ? "" : output.textContent;
    input.value = prev;
    $("counter").textContent = input.value.length + " characters";
    setOutput("Translation", true);
    if (input.value.trim()) translate();
  }

  input.addEventListener("input", scheduleTranslate);
  translateBtn.addEventListener("click", translate);
  swapBtn.addEventListener("click", swap);
  $("clearBtn").addEventListener("click", () => {
    input.value = ""; $("counter").textContent = "0 characters";
    setOutput("Translation", true); input.focus();
  });
  $("copyBtn").addEventListener("click", () => {
    if (!output.classList.contains("placeholder")) navigator.clipboard.writeText(output.textContent);
  });
  $("mode").addEventListener("change", () => { if (input.value.trim()) translate(); });
  input.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); translate(); }
  });

  refreshLabels();
</script>
</body>
</html>
